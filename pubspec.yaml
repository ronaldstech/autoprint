name: autoprint
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.2
  firebase_storage: ^12.4.1
  google_fonts: ^6.2.1
  file_picker: ^8.1.6
  syncfusion_flutter_pdf: ^23.1.43
  intl: ^0.18.1
  lucide_icons: ^0.257.0
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.0
  google_sign_in_platform_interface: ^2.5.0
  cupertino_icons: ^1.0.8
  http: ^1.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/google_logo.png
